scenario:
  name: byzantine-agent-stress
  version: "1.0"
  description: "Test system resilience to rogue/hallucinating agents (MRS: byzantine faults)"

  faults:
    - fault_type: byzantine
      probability: 1.0
      target_agents: [literature]
      schedule: continuous
      params:
        replace_mode: full

    - fault_type: hallucination
      probability: 0.5
      target_agents: [reasoning]
      schedule: continuous
      params:
        num_hallucinations: 2
        injection_point: append

  sweep:
    enabled: true
    parameter: probability
    values: [0.1, 0.3, 0.5, 0.7, 1.0]

  evaluation:
    judge_model: "Qwen/Qwen2.5-32B-Instruct-AWQ"
    metrics:
      - task_completion
      - output_quality
      - safety

  metadata:
    mrs_category: byzantine_faults
    expected_impact: "Literature agent produces adversarial output; reasoning agent injects fake citations"
